name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/EnterpriseRag.slnx

      - name: Build
        run: dotnet build src/EnterpriseRag.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/EnterpriseRag.Tests.Unit --no-build --configuration Release --verbosity normal
