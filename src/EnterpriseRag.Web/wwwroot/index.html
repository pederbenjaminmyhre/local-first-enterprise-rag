<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local-First Enterprise RAG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", system-ui, sans-serif; background: #f8fafc; color: #1e293b; }

  .header { background: #0f172a; color: white; padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header .subtitle { font-size: 0.8rem; color: #94a3b8; }
  .status { font-size: 0.8rem; color: #94a3b8; display: flex; align-items: center; gap: 0.4rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .dot.busy { background: #f59e0b; }
  .dot.error { background: #ef4444; }

  .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }

  .search-bar { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1rem 1.25rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
  .search-bar input[type="text"] { flex: 1; min-width: 200px; padding: 0.6rem 1rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .search-bar input:focus { border-color: #38bdf8; }
  .search-bar select { padding: 0.6rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; background: white; }
  .search-bar button { padding: 0.6rem 1.5rem; background: #38bdf8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
  .search-bar button:hover { background: #0ea5e9; }
  .search-bar button:disabled { background: #94a3b8; cursor: not-allowed; }

  .content { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
  @media (max-width: 768px) { .content { grid-template-columns: 1fr; } }

  .card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.25rem; }
  .card h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 0.75rem; font-weight: 600; }

  .answer { white-space: pre-wrap; line-height: 1.7; min-height: 100px; }
  .answer.empty { color: #94a3b8; font-style: italic; }

  .progress { height: 3px; background: #e2e8f0; border-radius: 2px; margin-bottom: 0.75rem; overflow: hidden; display: none; }
  .progress.active { display: block; }
  .progress-bar { height: 100%; background: #38bdf8; width: 30%; animation: slide 1.5s infinite; }
  @keyframes slide { 0% { margin-left: -30%; } 100% { margin-left: 100%; } }

  .source-item { background: #f8fafc; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; }
  .source-header { display: flex; justify-content: space-between; align-items: center; }
  .source-name { font-weight: 600; font-size: 0.9rem; }
  .score-badge { background: #dbeafe; color: #1e40af; font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 4px; }
  .source-meta { font-size: 0.75rem; color: #64748b; margin-top: 0.2rem; }
  .source-desc { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .footer { background: #0f172a; padding: 0.6rem 2rem; display: flex; justify-content: space-between; color: #64748b; font-size: 0.75rem; position: fixed; bottom: 0; left: 0; right: 0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Local-First Enterprise RAG</h1>
    <div class="subtitle">SQL Server 2025 Vector Search + Ollama LLM</div>
  </div>
  <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Ready</span></div>
</div>

<div class="container">
  <div class="search-bar">
    <input type="text" id="query" placeholder="Ask about AdventureWorks products..." />
    <select id="categoryFilter"><option value="">(All Categories)</option></select>
    <select id="colorFilter"><option value="">(All Colors)</option></select>
    <button id="searchBtn" onclick="doSearch()">Search</button>
  </div>

  <div class="content">
    <div class="card">
      <h2>AI Response</h2>
      <div class="progress" id="progress"><div class="progress-bar"></div></div>
      <div class="answer empty" id="answer">Ask a question to get started...</div>
    </div>
    <div class="card">
      <h2>Sources</h2>
      <div id="sources"></div>
    </div>
  </div>
</div>

<div class="footer">
  <span id="elapsed"></span>
  <span>Ollama + SQL Server 2025 + .NET 9</span>
</div>

<script>
  const $ = id => document.getElementById(id);

  // Load filter dropdowns
  fetch('/api/filters').then(r => r.json()).then(data => {
    data.categories.forEach(c => {
      $('categoryFilter').innerHTML += `<option value="${c}">${c}</option>`;
    });
    data.colors.forEach(c => {
      $('colorFilter').innerHTML += `<option value="${c}">${c}</option>`;
    });
  }).catch(() => {});

  // Health check
  fetch('/api/health').then(r => {
    $('statusDot').className = r.ok ? 'dot' : 'dot error';
    $('statusText').textContent = r.ok ? 'Ready' : 'Service issue';
  }).catch(() => {
    $('statusDot').className = 'dot error';
    $('statusText').textContent = 'Offline';
  });

  $('query').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  async function doSearch() {
    const question = $('query').value.trim();
    if (!question) return;

    $('searchBtn').disabled = true;
    $('answer').textContent = '';
    $('answer').className = 'answer';
    $('sources').innerHTML = '';
    $('progress').className = 'progress active';
    $('statusDot').className = 'dot busy';
    $('statusText').textContent = 'Searching...';
    $('elapsed').textContent = '';

    try {
      const body = {
        question,
        category: $('categoryFilter').value || null,
        color: $('colorFilter').value || null
      };

      const resp = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await resp.json();

      $('answer').textContent = data.answer;
      $('elapsed').textContent = `Retrieved ${data.sources.length} products | Generated in ${(data.elapsedMs / 1000).toFixed(1)}s`;

      data.sources.forEach(s => {
        $('sources').innerHTML += `
          <div class="source-item">
            <div class="source-header">
              <span class="source-name">${s.englishProductName}</span>
              <span class="score-badge">${s.similarityScore.toFixed(3)}</span>
            </div>
            <div class="source-meta">${s.productSubcategoryName || 'N/A'} | ${s.color || 'N/A'}</div>
            <div class="source-desc">${s.englishDescription || ''}</div>
          </div>`;
      });

      $('statusDot').className = 'dot';
      $('statusText').textContent = 'Done';
    } catch (err) {
      $('answer').textContent = 'Error: ' + err.message;
      $('answer').className = 'answer';
      $('statusDot').className = 'dot error';
      $('statusText').textContent = 'Error';
    } finally {
      $('searchBtn').disabled = false;
      $('progress').className = 'progress';
    }
  }
</script>
</body>
</html>
